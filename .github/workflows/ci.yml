name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"

jobs:
  # ============================================================
  # Job 1: Lint and Test the Python application
  # ============================================================
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r app/requirements-dev.txt
          pip install flake8

      - name: Lint with flake8
        run: |
          # Stop on syntax errors or undefined names
          flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics
          # Warn on other style issues but don't fail
          flake8 app/ --count --max-complexity=10 --max-line-length=120 --statistics --exit-zero

      - name: Run pytest
        env:
          TESTING: "true"
        run: |
          pytest tests/ -v --cov=app --cov-report=term --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  # ============================================================
  # Job 2: Security scanning
  # ============================================================
  security:
    name: Security Scans
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # --- Scan Terraform code for misconfigurations ---
      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working_directory: terraform/
          soft_fail: true # Don't block PRs initially; tighten later

      # --- Scan the Docker image for vulnerabilities ---
      - name: Build Docker image (for scanning)
        run: docker build -t clouddeploy:scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: "clouddeploy:scan"
          format: "table"
          exit-code: "0" # Don't fail build initially
          severity: "CRITICAL,HIGH"
          ignore-unfixed: true

  # ============================================================
  # Job 3: Build Docker image (no push in Phase 1)
  # In Phase 2 this would push to ECR.
  # ============================================================
  build:
    name: Build Image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false # Phase 2: change to true with ECR credentials
          tags: |
            clouddeploy:${{ github.sha }}
            clouddeploy:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ----- PHASE 2 (commented out): push to ECR -----
