global:
  scrape_interval: 15s
  evaluation_interval: 15s

# Load alerting rules
rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape the Flask app's /metrics endpoint
  - job_name: 'clouddeploy-app'
    metrics_path: '/metrics'
    static_configs:
      - targets: ['app:5000']
