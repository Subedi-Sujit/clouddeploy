groups:
  - name: clouddeploy_alerts
    interval: 30s
    rules:
      # Alert if the app is down
      - alert: AppDown
        expr: up{job="clouddeploy-app"} == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "CloudDeploy app is down"
          description: "The Flask application has been unreachable for over 1 minute."

      # Alert if 5xx error rate exceeds 5% over 5 minutes
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(flask_http_request_total{status=~"5.."}[5m]))
            /
            sum(rate(flask_http_request_total[5m]))
          ) > 0.05
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High 5xx error rate detected"
          description: "5xx error rate is above 5% over the last 5 minutes."

      # Alert if p95 latency exceeds 1 second
      - alert: HighLatency
        expr: |
          histogram_quantile(0.95,
            sum(rate(flask_http_request_duration_seconds_bucket[5m])) by (le)
          ) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High request latency"
          description: "p95 latency is above 1 second."
